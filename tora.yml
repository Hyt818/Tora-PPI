name: Tora-PPI
channels:
  - conda-forge
  - bioconda
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/free/
  - defaults

dependencies:
  - python=3.9
  - pip

  - numpy
  - pandas
  - scipy
  - scikit-learn
  - tqdm
  - pyyaml
  - networkx

  - pytorch=2.2.0
  - pytorch-cuda=11.8
  - pyg=2.6.0

  - rdkit
  - git-lfs

  - pip:
      - tensorboardX==2.6.2.2
      - transformers